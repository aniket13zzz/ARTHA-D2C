name: Daily Reconciliation Sync

on:
  schedule:
    - cron: "30 20 * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Trigger Artha Sync
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wake up Render service
        run: |
          echo "Warming up backend..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "${{ secrets.BACKEND_URL }}/health" || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready."
              break
            fi
            echo "Sleeping 30s..."
            sleep 30
          done

      - name: Trigger sync endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST "${{ secrets.BACKEND_URL }}/api/cron/sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Sync failed with HTTP $HTTP_STATUS"
            exit 1
          fi

      - name: Log result
        if: always()
        run: |
          echo "Sync completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          cat /tmp/response.json || true

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"Artha V2 nightly sync FAILED at $(date -u). Check GitHub Actions.\"}" || true
