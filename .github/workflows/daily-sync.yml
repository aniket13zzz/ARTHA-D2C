name: Daily Reconciliation Sync

on:
  schedule:
    - cron: '30 20 * * *'   # 2 AM IST = 8:30 PM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Wake up Render service
        run: |
          echo "Warming up backend..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "${{ secrets.BACKEND_URL }}/health")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend ready."
              break
            fi
            sleep 10
          done

      - name: Trigger sync endpoint
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            --max-time 120 \
            -X POST "${{ secrets.BACKEND_URL }}/api/cron/sync" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Sync failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          echo "Sync completed successfully."

      - name: Log result
        if: always()
        run: echo "Workflow finished at $(date -u)"

      - name: Notify on failure
        if: failure()
        env:
          SLACK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_URL" ]; then
            curl -s -X POST "$SLACK_URL" \
              -H "Content-Type: application/json" \
              -d '{"text":"❌ Artha nightly sync FAILED. Check GitHub Actions logs."}'
          fi
